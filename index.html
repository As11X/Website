<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Минимальный Магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div>
            <h2>🛒 Минимальный Магазин</h2>
        </div>
        <div>
            <button class="nav-btn" onclick="showPage('catalog')">Каталог</button>
            <button class="nav-btn" onclick="showPage('cart')">Корзина <span id="cartCount"></span></button>
            <button class="nav-btn" onclick="showPage('wishlist')">Избранное <span id="wishlistCount"></span></button>
            <button class="nav-btn" onclick="showPage('profile')">Профиль</button>
            <button class="nav-btn" onclick="showPage('game')">Игра</button>
            <div class="theme-controls">
                <button class="btn" onclick="toggleTheme()">🌓</button>
                <button class="btn" onclick="toggleAccessibility()">👁</button>
            </div>
            <button class="nav-btn" id="authBtn" onclick="showAuthModal()">Войти</button>
        </div>
    </div>

    <div class="container">
        <!-- Каталог -->
        <div id="catalog" class="page active">
            <div class="slider">
                <div class="slide active">🎉 СКИДКА 50% НА ВСЁ!</div>
                <div class="slide">🚚 БЕСПЛАТНАЯ ДОСТАВКА от 3000₽</div>
                <div class="slide">🎁 ПОДАРОК при покупке от 5000₽</div>
            </div>

            <h2>Каталог товаров</h2>
            
            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Поиск..." onkeyup="filterProducts()">
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="">Все категории</option>
                </select>
                <select id="priceFilter" onchange="filterProducts()">
                    <option value="">Любая цена</option>
                    <option value="0-50">До 50₽</option>
                    <option value="50-100">50-100₽</option>
                    <option value="100-500">100-500₽</option>
                    <option value="500-1000">500-1000₽</option>
                    <option value="1000-99999">Более 1000₽</option>
                </select>
                <select id="ratingFilter" onchange="filterProducts()">
                    <option value="">Любой рейтинг</option>
                    <option value="4">4+ звезды</option>
                    <option value="3">3+ звезды</option>
                </select>
                <select id="brandFilter" onchange="filterProducts()">
                    <option value="">Любой бренд</option>
                </select>
                <select id="stockFilter" onchange="filterProducts()">
                    <option value="">Все товары</option>
                    <option value="instock">В наличии</option>
                    <option value="lowstock">Заканчивается</option>
                </select>
                <select id="discountFilter" onchange="filterProducts()">
                    <option value="">Любая скидка</option>
                    <option value="yes">Со скидкой</option>
                    <option value="no">Без скидки</option>
                </select>
                <select id="sortFilter" onchange="filterProducts()">
                    <option value="default">Сортировка</option>
                    <option value="price-asc">Сначала дешевые</option>
                    <option value="price-desc">Сначала дорогие</option>
                    <option value="rating-desc">По рейтингу</option>
                    <option value="name-asc">По названию А-Я</option>
                </select>
            </div>

            <div id="productsGrid" class="products-grid"></div>
            <div id="pagination" class="pagination"></div>
        </div>

        <!-- Карточка товара -->
        <div id="productDetail" class="page">
            <button class="btn" onclick="showPage('catalog')">← Назад к каталогу</button>
            <div id="productDetailContent"></div>
        </div>

        <!-- Корзина -->
        <div id="cart" class="page">
            <h2>Корзина</h2>
            <div id="cartItems"></div>
            <div id="cartTotal"></div>
            <button class="btn" onclick="checkout()">Оформить заказ</button>
        </div>

        <!-- Избранное -->
        <div id="wishlist" class="page">
            <h2>Избранное</h2>
            <div id="wishlistItems"></div>
        </div>

        <!-- Профиль -->
        <div id="profile" class="page">
            <h2>Личный кабинет</h2>
            <div id="profileContent"></div>
        </div>

        <!-- Игра -->
        <div id="game" class="page">
            <h2>Игра - Получи промокод!</h2>
            <div class="game-area">
                <p>Угадай число от 1 до 10 и получи скидку!</p>
                <input type="number" id="guessNumber" min="1" max="10" placeholder="Введите число">
                <button class="btn" onclick="playGame()">Играть</button>
                <div id="gameResult"></div>
            </div>
            <div id="promoCodes"></div>
        </div>
    </div>

    <!-- Модальное окно авторизации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <h2 id="authTitle">Вход</h2>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Пароль">
            <input type="text" id="authName" placeholder="Имя (только для регистрации)" style="display:none;">
            <button class="btn" onclick="authenticate()" id="authSubmit">Войти</button>
            <button class="btn" onclick="toggleAuthMode()">Переключить на регистрацию</button>
        </div>
    </div>

    <!-- Модальное окно отзывов -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReviewModal()">&times;</span>
            <h2>Отзывы</h2>
            <div id="reviewsList"></div>
            <h3>Оставить отзыв</h3>
            <select id="reviewRating">
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>
            <textarea id="reviewText" placeholder="Ваш отзыв..."></textarea>
            <button class="btn" onclick="submitReview()">Отправить</button>
        </div>
    </div>
</body>
</html>
